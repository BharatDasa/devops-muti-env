
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hello-app.fullname" . }}-sa
  namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "hello-app.fullname" . }}-role
  namespace: {{ .Release.Namespace }}
rules: []

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hello-app.fullname" . }}-binding
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "hello-app.fullname" . }}-sa
roleRef:
  kind: Role
  name: {{ include "hello-app.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
