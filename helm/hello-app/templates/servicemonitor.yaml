{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "hello-app.fullname" . }}
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: {{ include "hello-app.name" . }}
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 15s
{{- end }}
