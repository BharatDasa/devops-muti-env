apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-app-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: git@github.com:BharatDasa/devops-muti-env.git
    targetRevision: master
    path: helm/hello-app
    helm:
      valueFiles:
        - ../../gitops/dev/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

      
